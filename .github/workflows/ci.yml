name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    
    steps:
    - uses: actions/checkout@v7
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install UV
      run: curl -LsSf https://astral.sh/uv/install.sh | sh
    
    - name: Install dependencies
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        export PYTHONPATH="${PWD}/src:${PYTHONPATH}"
        # Sync dependencies from lock file
        uv sync --all-extras
        # Install package in editable mode with PYTHONPATH set
        uv pip install -e .

    - name: Run Pylint
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        export PYTHONPATH="${PWD}/src:${PYTHONPATH}"
        # Run pylint with PYTHONPATH
        PYTHONPATH="${PWD}/src:${PYTHONPATH}" uv run pylint src/ --fail-under=9.5 --exit-zero
        echo "Pylint score:"
        PYTHONPATH="${PWD}/src:${PYTHONPATH}" uv run pylint src/ --score=y | grep "Your code has been rated"
    
    - name: Run Tests
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        export PYTHONPATH="${PWD}/src:${PYTHONPATH}"
        set +e
        PYTHONPATH="${PWD}/src:${PYTHONPATH}" uv run pytest tests/ -v \
          --cov=src \
          --cov-report=term-missing \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=json:coverage.json
        test_status=$?
        set -e
        coverage_status=0
        if [ -f coverage.json ]; then
          PYTHONPATH="${PWD}/src:${PYTHONPATH}" uv run python .github/scripts/check-python-coverage-floor.py coverage.json --min 50 || coverage_status=$?
        else
          echo "coverage.json was not generated."
          coverage_status=1
        fi
        {
          echo "### Python test coverage (${{ matrix.python-version }})"
          echo
          echo '```'
          PYTHONPATH="${PWD}/src:${PYTHONPATH}" uv run coverage report --show-missing || echo "Coverage report unavailable."
          echo '```'
        } >> "$GITHUB_STEP_SUMMARY"
        if [ "$test_status" -ne 0 ]; then
          exit "$test_status"
        fi
        exit "$coverage_status"

    - name: Upload Python coverage report
      uses: actions/upload-artifact@v6
      with:
        name: python-coverage-${{ matrix.python-version }}
        path: |
          coverage.xml
          coverage.json
          htmlcov/
        if-no-files-found: warn

    - name: Check Pylint minimum score
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        export PYTHONPATH="${PWD}/src:${PYTHONPATH}"
        PYTHONPATH="${PWD}/src:${PYTHONPATH}" uv run pylint src/ --fail-under=9.5

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'
        cache-dependency-path: src/modules/interfaces/react/package-lock.json

    - name: npm install packages
      working-directory: src/modules/interfaces/react
      run: npm install

    - name: Run React tests
      working-directory: src/modules/interfaces/react
      run: npm run validate
