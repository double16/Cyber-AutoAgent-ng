services:
  cyber-autoagent:
    image: cyber-autoagent:latest
    build:
      context: ../
      dockerfile: docker/Dockerfile
      args:
        APT_PROXY: ${APT_PROXY:-}
    container_name: cyber-autoagent
    # React terminal is now the default entrypoint
    # No command override needed - starts interactively
    # Add capabilities for network tools without full root access
    cap_add:
      - NET_RAW      # For packet crafting (nmap SYN scans, tcpdump)
      - NET_ADMIN    # For network administration
      - SYS_PTRACE   # For process tracing (some exploitation tools)
    devices:
      - /dev/net/tun
    environment:
      # Provider Configuration
      - CYBER_AGENT_PROVIDER=${CYBER_AGENT_PROVIDER:-bedrock}
      - CYBER_AGENT_LLM_MODEL=${CYBER_AGENT_LLM_MODEL:-}
      - CYBER_AGENT_SWARM_MODEL=${CYBER_AGENT_SWARM_MODEL:-}
      - CYBER_AGENT_EVALUATION_MODEL=${CYBER_AGENT_EVALUATION_MODEL:-}
      - CYBER_AGENT_EMBEDDING_MODEL=${CYBER_AGENT_EMBEDDING_MODEL:-}
      - MAX_TOKENS=${MAX_TOKENS:-}
      - MAX_TOKENS_LIMIT=${MAX_TOKENS_LIMIT:-}
      - MAX_TOKENS_REASONING_LIMIT=${MAX_TOKENS_REASONING_LIMIT:-}
      - MAX_COMPLETION_TOKENS=${MAX_COMPLETION_TOKENS:-}
      - CYBER_CONTEXT_LIMIT=${CYBER_CONTEXT_LIMIT:-}
      - CYBER_RATE_LIMIT_TOKENS_PER_MIN=${CYBER_RATE_LIMIT_TOKENS_PER_MIN:-}
      - CYBER_RATE_LIMIT_REQ_PER_MIN=${CYBER_RATE_LIMIT_REQ_PER_MIN:-}
      - CYBER_RATE_LIMIT_MAX_CONCURRENT=${CYBER_RATE_LIMIT_MAX_CONCURRENT:-}
      - CYBER_REASONING_ALLOW=${CYBER_REASONING_ALLOW:-}
      - CYBER_REASONING_DENY=${CYBER_REASONING_DENY:-}
      - CYBER_AGENT_PRICING_INPUT=${CYBER_AGENT_PRICING_INPUT:-}
      - CYBER_AGENT_PRICING_OUTPUT=${CYBER_AGENT_PRICING_OUTPUT:-}
      - CYBER_AGENT_PRICING_CACHE_READ=${CYBER_AGENT_PRICING_CACHE_READ:-}
      - CYBER_AGENT_PRICING_CACHE_WRITE=${CYBER_AGENT_PRICING_CACHE_WRITE:-}

      # AWS Configuration
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      # - AWS_PROFILE=${AWS_PROFILE}

      # Ollama Configuration (Ollama Provider)
      - OLLAMA_HOST=${OLLAMA_HOST:-}
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-}
      - OLLAMA_TIMEOUT=${OLLAMA_TIMEOUT:-}
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-}

      # LiteLLM Provider API Keys
      - LITELLM_PROXY_API_KEY=${LITELLM_PROXY_API_KEY:-}
      - LITELLM_PROXY_API_BASE=${LITELLM_PROXY_API_BASE:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - ABLITERATION_API_KEY=${ABLITERATION_API_KEY:-}
      - AI21_API_KEY=${AI21_API_KEY:-}
      - AIML_API_KEY=${AIML_API_KEY:-}
      - AIML_API_BASE=${AIML_API_BASE:-}
      - ALEPHALPHA_API_KEY=${ALEPHALPHA_API_KEY:-}
      - AMAZON_NOVA_API_KEY=${AMAZON_NOVA_API_KEY:-}
      - ANYSCALE_API_KEY=${ANYSCALE_API_KEY:-}
      - STIMA_API_KEY=${STIMA_API_KEY:-}
      - BASETEN_API_KEY=${BASETEN_API_KEY:-}
      - BYTEZ_API_KEY=${BYTEZ_API_KEY:-}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY:-}
      - CHUTES_API_KEY=${CHUTES_API_KEY:-}
      - CLARIFAI_API_KEY=${CLARIFAI_API_KEY:-}
      - CLOUDFLARE_API_KEY=${CLOUDFLARE_API_KEY:-}
      - CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID:-}
      - CODESTRAL_API_KEY=${CODESTRAL_API_KEY:-}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - COMETAPI_KEY=${COMETAPI_KEY:-}
      - COMPACTIFAI_API_KEY=${COMPACTIFAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DATABRICKS_CLIENT_ID=${DATABRICKS_CLIENT_ID:-}
      - DATABRICKS_CLIENT_SECRET=${DATABRICKS_CLIENT_SECRET:-}
      - DATABRICKS_API_BASE=${DATABRICKS_API_BASE:-}
      - DATAROBOT_API_KEY=${DATAROBOT_API_KEY:-}
      - DATAROBOT_API_BASE=${DATAROBOT_API_BASE:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - DEEPINFRA_API_KEY=${DEEPINFRA_API_KEY:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DOCKER_MODEL_RUNNER_API_BASE=${DOCKER_MODEL_RUNNER_API_BASE:-}
      - DOCKER_MODEL_RUNNER_API_KEY=${DOCKER_MODEL_RUNNER_API_KEY:-}
      - FAL_AI_API_KEY=${FAL_AI_API_KEY:-}
      - FEATHERLESS_AI_API_KEY=${FEATHERLESS_AI_API_KEY:-}
      - FIREWORKS_AI_API_KEY=${FIREWORKS_AI_API_KEY:-}
      - FRIENDLI_TOKEN=${FRIENDLI_TOKEN:-}
      - GALADRIEL_API_KEY=${GALADRIEL_API_KEY:-}
      - GITHUB_API_KEY=${GITHUB_API_KEY:-}
      - GMI_API_KEY=${GMI_API_KEY:-}
      - GRADIENT_AI_API_KEY=${GRADIENT_AI_API_KEY:-}
      - GRADIENT_AI_AGENT_ENDPOINT=${GRADIENT_AI_AGENT_ENDPOINT:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - HELICONE_API_KEY=${HELICONE_API_KEY:-}
      - HEROKU_API_BASE=${HEROKU_API_BASE:-}
      - HEROKU_API_KEY=${HEROKU_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - HYPERBOLIC_API_KEY=${HYPERBOLIC_API_KEY:-}
      - INFINITY_API_BASE=${INFINITY_API_BASE:-}
      - JINA_AI_API_KEY=${JINA_AI_API_KEY:-}
      - LAMBDA_API_KEY=${LAMBDA_API_KEY:-}
      - LEMONADE_API_BASE=${LEMONADE_API_BASE:-}
      - LLAMAGATE_API_KEY=${LLAMAGATE_API_KEY:-}
      - LM_STUDIO_API_BASE=${LM_STUDIO_API_BASE:-}
      - LM_STUDIO_API_KEY=${LM_STUDIO_API_KEY:-}
      - MANUS_API_KEY=${MANUS_API_KEY:-}
      - LLAMA_API_KEY=${LLAMA_API_KEY:-}
      - MILVUS_API_KEY=${MILVUS_API_KEY:-}
      - MILVUS_API_BASE=${MILVUS_API_BASE:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - MORPH_API_KEY=${MORPH_API_KEY:-}
      - NEBIUS_API_KEY=${NEBIUS_API_KEY:-}
      - NLP_CLOUD_API_KEY=${NLP_CLOUD_API_KEY:-}
      - NANOGPT_API_KEY=${NANOGPT_API_KEY:-}
      - NOVITA_API_KEY=${NOVITA_API_KEY:-}
      - NSCALE_API_KEY=${NSCALE_API_KEY:-}
      - NVIDIA_NIM_API_KEY=${NVIDIA_NIM_API_KEY:-}
      - NVIDIA_NIM_API_BASE=${NVIDIA_NIM_API_BASE:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_API_BASE=${OPENROUTER_API_BASE:-}
      - OR_SITE_URL=${OR_SITE_URL:-}
      - OR_APP_NAME=${OR_APP_NAME:-}
      - SARVAM_API_KEY=${SARVAM_API_KEY:-}
      - OVHCLOUD_API_KEY=${OVHCLOUD_API_KEY:-}
      - PERPLEXITYAI_API_KEY=${PERPLEXITYAI_API_KEY:-}
      - POE_API_KEY=${POE_API_KEY:-}
      - PUBLICAI_API_KEY=${PUBLICAI_API_KEY:-}
      - PUBLICAI_API_BASE=${PUBLICAI_API_BASE:-}
      - PREDIBASE_API_KEY=${PREDIBASE_API_KEY:-}
      - PREDIBASE_TENANT_ID=${PREDIBASE_TENANT_ID:-}
      - RAGFLOW_API_KEY=${RAGFLOW_API_KEY:-}
      - RAGFLOW_API_BASE=${RAGFLOW_API_BASE:-}
      - RECRAFT_API_KEY=${RECRAFT_API_KEY:-}
      - RECRAFT_API_BASE=${RECRAFT_API_BASE:-}
      - REPLICATE_API_KEY=${REPLICATE_API_KEY:-}
      - RUNWAYML_API_KEY=${RUNWAYML_API_KEY:-}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY:-}
      - AICORE_AUTH_URL=${AICORE_AUTH_URL:-}
      - AICORE_CLIENT_ID=${AICORE_CLIENT_ID:-}
      - AICORE_CLIENT_SECRET=${AICORE_CLIENT_SECRET:-}
      - AICORE_RESOURCE_GROUP=${AICORE_RESOURCE_GROUP:-}
      - AICORE_BASE_URL=${AICORE_BASE_URL:-}
      - SCW_SECRET_KEY=${SCW_SECRET_KEY:-}
      - STABILITY_API_KEY=${STABILITY_API_KEY:-}
      - SYNTHETIC_API_KEY=${SYNTHETIC_API_KEY:-}
      - SNOWFLAKE_JWT=${SNOWFLAKE_JWT:-}
      - SNOWFLAKE_ACCOUNT_ID=${SNOWFLAKE_ACCOUNT_ID:-}
      - TOGETHERAI_API_KEY=${TOGETHERAI_API_KEY:-}
      - V0_API_KEY=${V0_API_KEY:-}
      - VERCEL_AI_GATEWAY_API_KEY=${VERCEL_AI_GATEWAY_API_KEY:-}
      - VERCEL_OIDC_TOKEN=${VERCEL_OIDC_TOKEN:-}
      - VOLCENGINE_API_KEY=${VOLCENGINE_API_KEY:-}
      - ARK_API_KEY=${ARK_API_KEY:-}
      - VOYAGE_API_KEY=${VOYAGE_API_KEY:-}
      - WANDB_API_KEY=${WANDB_API_KEY:-}
      - WATSONX_URL=${WATSONX_URL:-}
      - WATSONX_APIKEY=${WATSONX_APIKEY:-}
      - WATSONX_TOKEN=${WATSONX_TOKEN:-}
      - WATSONX_PROJECT_ID=${WATSONX_PROJECT_ID:-}
      - WATSONX_DEPLOYMENT_SPACE_ID=${WATSONX_DEPLOYMENT_SPACE_ID:-}
      - WATSONX_ZENAPIKEY=${WATSONX_ZENAPIKEY:-}
      - XAI_API_KEY=${XAI_API_KEY:-}
      - XIAOMI_MIMO_API_KEY=${XIAOMI_MIMO_API_KEY:-}
      - XINFERENCE_API_BASE=${XINFERENCE_API_BASE:-}
      - XINFERENCE_API_KEY=${XINFERENCE_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}

      # Azure OpenAI Configuration (LiteLLM Provider)
      - AZURE_API_KEY=${AZURE_API_KEY:-}
      - AZURE_API_BASE=${AZURE_API_BASE:-}
      - AZURE_API_VERSION=${AZURE_API_VERSION:-}
      - AZURE_OPENAI_API_KEY=${AZURE_API_KEY:-}
      - AZURE_OPENAI_ENDPOINT=${AZURE_API_BASE:-}
      - OPENAI_API_VERSION=${AZURE_API_VERSION:-}

      # WebHook.site API key (OAST Provider)
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY:-}

      # Python configuration
      - PYTHONPATH=/app/src
      - PYTHONUNBUFFERED=1

      # Application configuration
      - DEV=${DEV:-true}
      - FORCE_COLOR=1
      - CONTAINER=docker  # Mark as Docker environment for React terminal detection
      - TOKENIZERS_PARALLELISM=true
      - STRANDS_NON_INTERACTIVE=true
      - STRANDS_HTTP_ALLOW_INSECURE_SSL=true
      - CYBER_ENABLE_PROMPT_OPTIMIZATION=${CYBER_ENABLE_PROMPT_OPTIMIZATION:-}
      - CYBER_ENABLE_PROMPT_OPTIMIZER=${CYBER_ENABLE_PROMPT_OPTIMIZER:-}
      - CYBER_AGENT_ENABLE_UNIFIED_OUTPUT=${CYBER_AGENT_ENABLE_UNIFIED_OUTPUT:-}
      - CYBER_PROMPT_TELEMETRY_THRESHOLD=${CYBER_PROMPT_TELEMETRY_THRESHOLD:-}
      - CYBER_PROMPT_CACHE_RELAX=${CYBER_PROMPT_CACHE_RELAX:-}
      - CYBER_CONVERSATION_WINDOW=${CYBER_CONVERSATION_WINDOW:-}
      - CYBER_CONVERSATION_PRESERVE_FIRST=${CYBER_CONVERSATION_PRESERVE_FIRST:-}
      - CYBER_CONVERSATION_PRESERVE_LAST=${CYBER_CONVERSATION_PRESERVE_LAST:-}
      - CYBER_AGENT_OUTPUT_DIR=${CYBER_AGENT_OUTPUT_DIR:-}
      - BYPASS_TOOL_CONSENT=${BYPASS_TOOL_CONSENT:-}
      - CYBER_PLUGIN_PATH=/app/external_plugins:/app/home_plugins
      - CYBER_HEAP_MONITOR_AUTOSTART=${CYBER_HEAP_MONITOR_AUTOSTART:-}

      # Memory configuration
      - MEM0_API_KEY=${MEM0_API_KEY:-}
      - MEM0_LLM_MODEL=${MEM0_LLM_MODEL:-}
      - OPENSEARCH_HOST=${OPENSEARCH_HOST:-}
      - MEM0_TELEMETRY=false

      # Observability configuration (auto-detected by default, forced true in compose mode)
      - ENABLE_OBSERVABILITY=${ENABLE_OBSERVABILITY:-true}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-http://langfuse-web:3000}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-cyber-public}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-cyber-secret}
      
      # Prompt management configuration (enabled by default)
      - ENABLE_LANGFUSE_PROMPTS=${ENABLE_LANGFUSE_PROMPTS:-true}
      - LANGFUSE_PROMPT_LABEL=${LANGFUSE_PROMPT_LABEL:-production}
      - LANGFUSE_PROMPT_CACHE_TTL=${LANGFUSE_PROMPT_CACHE_TTL:-300}
      
      # Evaluation configuration 
      - ENABLE_AUTO_EVALUATION=${ENABLE_AUTO_EVALUATION:-true}
      - RAGAS_EVALUATOR_MODEL=${RAGAS_EVALUATOR_MODEL:-}
      - EVALUATION_BATCH_SIZE=${EVALUATION_BATCH_SIZE:-5}
      - MIN_TOOL_ACCURACY_SCORE=${MIN_TOOL_ACCURACY_SCORE:-0.8}
      - MIN_EVIDENCE_QUALITY_SCORE=${MIN_EVIDENCE_QUALITY_SCORE:-0.7}
      - MIN_ANSWER_RELEVANCY_SCORE=${MIN_ANSWER_RELEVANCY_SCORE:-0.7}
      - MIN_CONTEXT_PRECISION_SCORE=${MIN_CONTEXT_PRECISION_SCORE:-0.8}
      - RAGAS_DO_NOT_TRACK=true

      # Tavily Search API, https://www.tavily.com/
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}

    volumes:
      # Unified output structure persistence
      # Use :delegated for Docker Desktop on macOS to fix permission issues
      - ../outputs:/app/outputs:delegated
      - ../tools:/app/tools:delegated
      - ../external_plugins:/app/external_plugins:delegated
      - ${HOME}/.cyber-autoagent/modules:/app/home_plugins:delegated
      - root_cache:/root/.cache

    # Network configuration
    networks:
      - default                    # Langfuse observability stack
      - cyber-autoagent_default    # Challenge targets network

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '3.0'
        reservations:
          memory: 2G
          cpus: '1.5'
    
    # For interactive debugging
    stdin_open: true
    tty: true
    
    depends_on:
      langfuse-web:
        condition: service_started

  # Langfuse observability service (self-hosted) 
  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    container_name: cyber-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      langfuse-worker:
        condition: service_started
    ports:
      - "0.0.0.0:3000:3000"
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/postgres
      
      # Auth configuration (required for browser access)
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: mysecret
      
      # Network binding
      HOST: 0.0.0.0
      HOSTNAME: 0.0.0.0
      
      # Security keys - regenerate with: openssl rand -hex 32 & openssl rand -hex 16
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456}
      SALT: ${LANGFUSE_SALT:-cyber-dev-salt-12345}
      
      # ClickHouse configuration
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: myredissecret
      
      # MinIO/S3 configuration for batch exports
      LANGFUSE_S3_BATCH_EXPORT_BUCKET: langfuse
      LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: minio
      LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_BATCH_EXPORT_ENDPOINT: http://minio:9000
      LANGFUSE_S3_BATCH_EXPORT_REGION: us-east-1
      LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE: "true"
      
      # MinIO/S3 configuration for media uploads  
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      
      # MinIO/S3 configuration for event uploads
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      
      # Auto-initialize project for Cyber-AutoAgent
      LANGFUSE_INIT_ORG_ID: cyber-org-id
      LANGFUSE_INIT_ORG_NAME: Cyber-AutoAgent
      LANGFUSE_INIT_PROJECT_ID: cyber-project-id
      LANGFUSE_INIT_PROJECT_NAME: penetration-tests
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-cyber-public}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-cyber-secret}
      LANGFUSE_INIT_USER_EMAIL: admin@cyber-autoagent.com
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_ADMIN_PASSWORD:-changeme}
      
      # Features
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "true"
      TELEMETRY_ENABLED: "false"
      
      # Performance optimizations for pentesting workloads
      LANGFUSE_INGESTION_QUEUE_DELAY_MS: "5000"  # 5 seconds for faster trace visibility
      LANGFUSE_CACHE_API_KEY_ENABLED: "true"
      LANGFUSE_CACHE_API_KEY_TTL_SECONDS: "300"  # 5 minutes
      LANGFUSE_CACHE_PROMPT_ENABLED: "true"
      LANGFUSE_CACHE_PROMPT_TTL_SECONDS: "3600"  # 1 hour - useful for repeated scans
      
      # Security & Rate Limiting
      LANGFUSE_RATE_LIMITS_ENABLED: "true"
      
      # Data retention - skip init, configure in UI instead
      
      # Batch export configuration
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "true"
      LANGFUSE_S3_BATCH_EXPORT_PREFIX: "exports/"
      
      # Media upload support for evidence/screenshots
      LANGFUSE_S3_MEDIA_MAX_CONTENT_LENGTH: "104857600"  # 100MB
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: "evidence/"
      LANGFUSE_S3_MEDIA_DOWNLOAD_URL_EXPIRY_SECONDS: "86400"  # 24 hours
      
      # Concurrent operations optimization
      LANGFUSE_S3_CONCURRENT_WRITES: "25"
      
      # Disable signup for security
      NEXT_PUBLIC_SIGN_UP_DISABLED: "true"

    deploy:
      resources:
        limits:
          memory: 1250M
          cpus: '1.0'
        reservations:
          memory: 768M
          cpus: '0.1'

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    container_name: cyber-langfuse-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      # Database
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      DIRECT_URL: postgresql://postgres:postgres@postgres:5432/postgres
      
      # Security keys - regenerate with: openssl rand -hex 32 & openssl rand -hex 16
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY:-a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456}
      SALT: ${LANGFUSE_SALT:-cyber-dev-salt-12345}
      
      # ClickHouse configuration
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
      
      # Redis configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_AUTH: myredissecret
      
      # MinIO/S3 configuration
      LANGFUSE_S3_BATCH_EXPORT_BUCKET: langfuse
      LANGFUSE_S3_BATCH_EXPORT_ACCESS_KEY_ID: minio
      LANGFUSE_S3_BATCH_EXPORT_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_BATCH_EXPORT_ENDPOINT: http://minio:9000
      LANGFUSE_S3_BATCH_EXPORT_REGION: us-east-1
      LANGFUSE_S3_BATCH_EXPORT_FORCE_PATH_STYLE: "true"
      
      # MinIO/S3 configuration for media uploads  
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      
      # MinIO/S3 configuration for event uploads
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minio
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: miniosecret
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      
      # Performance optimizations (same as web service)
      LANGFUSE_INGESTION_QUEUE_DELAY_MS: "5000"
      LANGFUSE_S3_CONCURRENT_WRITES: "25"
      
      # Batch export configuration
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "true"
      LANGFUSE_S3_BATCH_EXPORT_PREFIX: "exports/"
      
      # Media configuration
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: "evidence/"

    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.3'
        reservations:
          memory: 128M
          cpus: '0.1'

  postgres:
    image: postgres:15-alpine
    container_name: cyber-langfuse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - langfuse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10

    deploy:
      resources:
        limits:
          memory: 100M
          cpus: '0.2'
        reservations:
          memory: 64M
          cpus: '0.1'

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    container_name: cyber-langfuse-clickhouse
    restart: unless-stopped
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: clickhouse
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - langfuse_clickhouse_data:/var/lib/clickhouse
      - langfuse_clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

    deploy:
      resources:
        limits:
          memory: 1.8G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.2'

  redis:
    image: docker.io/redis:7
    container_name: cyber-langfuse-redis
    restart: unless-stopped
    command: --requirepass myredissecret
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -h 127.0.0.1 -p 6379 -a myredissecret ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

    deploy:
      resources:
        limits:
          memory: 64M
          cpus: '0.3'
        reservations:
          memory: 20M
          cpus: '0.1'

  minio:
    image: docker.io/minio/minio
    container_name: cyber-langfuse-minio
    restart: unless-stopped
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniosecret
    ports:
      - "9090:9000"
      - "9091:9001"
    volumes:
      - langfuse_minio_data:/data

    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.2'
        reservations:
          memory: 256M
          cpus: '0.1'

# Named volumes for better control
volumes:
  langfuse_postgres_data:
    driver: local
  langfuse_clickhouse_data:
    driver: local
  langfuse_clickhouse_logs:
    driver: local
  langfuse_redis_data:
    driver: local
  langfuse_minio_data:
    driver: local
  langfuse_keys:
    driver: local
  root_cache:
    driver: local

networks:
  default:
    driver: bridge
  cyber-autoagent_default:
    driver: bridge
